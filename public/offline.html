<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Pro - Offline</title>
  <style>
    :root {
      --bg: #0f172a;
      --fg: #f8fafc;
      --muted: #64748b;
      --accent: #3b82f6;
      --border: #1e293b;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
    }
    
    .icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      font-size: 2.5rem;
    }
    
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    
    p {
      color: var(--muted);
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    
    .retry-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .retry-btn:hover {
      opacity: 0.9;
    }
    
    .features {
      margin-top: 3rem;
      text-align: left;
      background: var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }
    
    .features h2 {
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    
    .feature {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0;
    }
    
    .feature-icon {
      width: 24px;
      height: 24px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection. 
      Don't worry - your data is safe and will sync when you're back online.
    </p>
    <button class="retry-btn" onclick="location.reload()">
      Try Again
    </button>
    
    <div class="features">
      <h2>Available Offline</h2>
      <div class="feature">
        <div class="feature-icon">✓</div>
        <span>View cached tasks</span>
      </div>
      <div class="feature">
        <div class="feature-icon">✓</div>
        <span>View cached clients</span>
      </div>
      <div class="feature">
        <div class="feature-icon">✓</div>
        <span>View cached deals</span>
      </div>
    </div>
  </div>
  
  <script>
    // Auto-retry when connection is restored
    window.addEventListener('online', () => {
      location.reload();
    });
  </script>
</body>
</html>
